<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DSE Mathematics Compulsory Part Practice Paper</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body>
	<style>
		#paper > div {
			margin-bottom: 2em;
		}
		img {
			filter: invert(1); 
			-webkit-touch-callout: none;
			-webkit-user-select: none;
			-khtml-user-select: none;
			-moz-user-select: none;
			-ms-user-select: none;
			user-select: none;
		}
	</style>
	<div id="paper">

	</div>
	<script>
		function sleep(ms) {
			return new Promise(resolve => setTimeout(resolve, ms));
		}

		fetch("questions.json", {method: "GET", type: "json"})
		.then((res) => res.json())
		.then(async (data) => {
			const e = document.getElementById("paper");
			let question = 1;
			for (const datum of data) {
				e.innerHTML += "<div>" + question + ". " + datum + "</div>";
				question += 1;
			}
			MathJax.typeset();
		})
	</script>
</body>
</html>
