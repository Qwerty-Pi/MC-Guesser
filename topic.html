	<script>
		function sleep(ms) {
			return new Promise(resolve => setTimeout(resolve, ms));
		}

        async function fetchJson(paper, year, file) {
            try {
                res = await fetch(`artifact/paper-${paper}/${year}/${file}.json`)
                return await res.json()
            } catch {
                return []
            }
        }

        questions = []
        topics = []

        async function loadQuestionJson(paper, year) {
            questions[year] = await fetchJson('2', year, 'questions')
        }

        async function loadTopicJson(paper, year) {
            topics[year] = await fetchJson('2', year, 'topics')
        }

        var years = ["2012-PP", "2012-CP"]
        for (year = 2012; year <= 2025; year++) {
            years.push(year)
        }

        async function loadData() {
            promises = []
            for (const year of years) {
                promises.push(loadQuestionJson('2', year))
                promises.push(loadTopicJson('2', year))
            }
            Promise.all(promises).then(() => {
                document.getElementById("load").style = "display: none"
                // document.getElementById("load-btn").style = ""
            })
        }

        async function changeTopic() {
            const label = $("#change-question-label").val()
            const parts = label.split(" ")
            const year = parts[0]
            const q = parts[1]
            const topic = $("#change-topic").val()

            let data = {
                'year': year,
                'q': q,
                'topic': topic
            }

            let headers = {
                "Content-Type": "application/json"
            }

            res = await fetch("update_topic.php", {
                method: "POST",
                headers: headers,
                body: JSON.stringify(data)
            })

            console.log(await res.text())
        }

        async function loadTopic() {
            const topic = document.getElementById("topic").value
            const e = document.getElementById("content");
            e.innerHTML = "";
            let qid = 1;
            for (const year of years) {
                const topics_year = topics[year]
                const questions_year = questions[year]
                for (var q = 0; q < questions_year.length; q++) {
                    let identifier = `${year} Q${q+1}`
                    if (topics_year[q] == topic) {
                        e.innerHTML += `<div class="question" data-identifier="${year} ${q}">${qid}. (${identifier}) ${questions_year[q]}</div>`
                        qid += 1;
                    }
                }
            }
            $("#change-topic").val(topic)
            $(".question").on('click', function(e) {
                $("#change-question-label").val($(e.target).data("identifier"))
                $("#change-question-label").change()
            })
            await MathJax.typesetPromise();
        }
        loadData()

		document.getElementById("topic").addEventListener('change', function() {
			loadTopic();
		})
